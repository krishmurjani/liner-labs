# This workflow runs every Friday at midnight Eastern time.
# It fetches fresh lyrics for all artists (skipping songs already in the JSON),
# rebuilds the search index, and opens a PR if anything changed.
# Artist slugs are read dynamically from scripts/artists-config.json —
# adding a new artist there is the only change needed.

name: Refresh Lyrics

on:
  schedule:
    # Cron format: minute hour day-of-month month day-of-week
    # 0 5 * * 6 = 5:00 AM UTC on Saturday = Friday midnight EST (UTC-5)
    - cron: '0 5 * * 6'
  # This lets you trigger the workflow manually from the GitHub Actions tab
  # Useful for testing before waiting until Friday
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest  # GitHub spins up a fresh Ubuntu VM for every run
    permissions:
      contents: write       # needed to push the PR branch
      pull-requests: write  # needed to open the PR

    steps:
      # Step 1: Download the repo onto the VM
      - name: Check out repo
        uses: actions/checkout@v4

      # Step 2: Install Python 3.12 on the VM
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install the two Python dependencies (lyricsgenius, python-dotenv)
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Step 4: Read slugs from artists-config.json so no workflow edits are
      # needed when adding a new artist — just update the JSON.
      - name: Get artist slugs
        id: slugs
        run: |
          echo "list=$(python3 -c "import json; print(' '.join(json.load(open('scripts/artists-config.json')).keys()))")" >> $GITHUB_OUTPUT

      # Step 5: Run fetch_lyrics.py for every artist with --incremental
      # --incremental means: keep existing lyrics, only add songs that are missing
      # GENIUS_ACCESS_TOKEN is pulled from the repo's GitHub Secrets (you'll set this once)
      - name: Fetch lyrics for all artists
        working-directory: scripts
        env:
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
        run: |
          for slug in ${{ steps.slugs.outputs.list }}; do
            echo "--- Fetching $slug ---"
            python fetch_lyrics.py --slug "$slug" --incremental
          done

      # Step 6: Rebuild the inverted search index for every artist
      # This must run after fetch so the index reflects any new songs
      - name: Rebuild search indexes
        working-directory: scripts
        run: |
          for slug in ${{ steps.slugs.outputs.list }}; do
            echo "--- Indexing $slug ---"
            python build_index.py --slug "$slug"
          done

      # Step 7: Check if any JSON files in public/data/ actually changed
      # If nothing changed (no new songs found), we skip the PR entirely
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      # Step 8: Compare old vs new songs.json per artist and build a markdown summary
      # Uses `git show HEAD:path` to get the committed version before the fetch ran,
      # then diffs song IDs to find what's new. Output goes into the PR body.
      - name: Build PR summary
        if: steps.diff.outputs.changed == 'true'
        id: summary
        run: |
          python3 << 'EOF'
          import json, subprocess, os

          with open("scripts/artists-config.json") as f:
              config = json.load(f)
          SLUGS = [(slug, data["name"]) for slug, data in config.items()]

          rows = []
          total_new = 0

          for slug, name in SLUGS:
              path = f"public/data/{slug}/songs.json"

              # Get the committed (pre-fetch) version of songs.json
              result = subprocess.run(
                  ["git", "show", f"HEAD:{path}"],
                  capture_output=True, text=True
              )
              old_ids = set()
              if result.returncode == 0:
                  old_ids = {str(s["id"]) for s in json.loads(result.stdout)}

              # Read the freshly fetched version
              try:
                  with open(path) as f:
                      new_songs = json.load(f)
              except FileNotFoundError:
                  continue

              added_ids = {str(s["id"]) for s in new_songs} - old_ids
              if added_ids:
                  new_by_id = {str(s["id"]): s["title"] for s in new_songs}
                  titles = sorted(new_by_id[i] for i in added_ids)
                  rows.append((name, len(added_ids), titles))
                  total_new += len(added_ids)

          # Build the markdown body
          if rows:
              lines = ["## Lyrics refresh summary", ""]
              lines.append("| Artist | New songs | Titles |")
              lines.append("|--------|:---------:|--------|")
              for name, count, titles in rows:
                  titles_str = ", ".join(f'"{t}"' for t in titles)
                  lines.append(f"| {name} | {count} | {titles_str} |")
              lines.append("")
              lines.append(f"**{total_new} new song{'s' if total_new != 1 else ''} total** — review the diff then merge to deploy.")
          else:
              lines = ["Metadata or index updates only — no new songs added."]

          body = "\n".join(lines)

          # Write multiline output to GITHUB_OUTPUT
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("body<<GHADELIMITER\n")
              f.write(body + "\n")
              f.write("GHADELIMITER\n")
          EOF

      # Step 9: If there were changes, open a pull request
      # GITHUB_TOKEN is automatically provided by GitHub — no setup needed
      # The PR branch is always named auto/lyrics-refresh (reused each week)
      - name: Open PR if lyrics changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/lyrics-refresh
          title: 'chore: weekly lyrics refresh'
          body: ${{ steps.summary.outputs.body }}
          commit-message: 'chore: weekly lyrics refresh'

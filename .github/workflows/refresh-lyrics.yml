# This workflow runs every Friday at midnight Eastern time.
# It auto-discovers new albums from Genius, fetches lyrics, rebuilds
# search indexes, and opens a PR if anything changed.
# Artist slugs are read dynamically from scripts/artists-config.json —
# adding a new artist there is the only change needed.

name: Refresh Lyrics

on:
  schedule:
    # Cron format: minute hour day-of-month month day-of-week
    # 0 5 * * 6 = 5:00 AM UTC on Saturday = Friday midnight EST (UTC-5)
    - cron: '0 5 * * 6'
  # This lets you trigger the workflow manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the PR branch
      pull-requests: write  # needed to open the PR

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Step 1: Check Genius for albums not yet in artists-config.json.
      # Adds new ones automatically (skipping deluxe editions, karaoke, etc.).
      # Also resolves and caches genius_artist_id for each artist on first run.
      - name: Discover new albums
        working-directory: scripts
        env:
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
        run: python discover_albums.py

      # Step 2: Read slugs dynamically — no workflow edit needed when adding an artist.
      - name: Get artist slugs
        id: slugs
        run: |
          echo "list=$(python3 -c "import json; print(' '.join(k for k in json.load(open('scripts/artists-config.json')) if not k.startswith('_')))")" >> $GITHUB_OUTPUT

      # Step 3: Fetch lyrics for any new songs (--incremental keeps existing lyrics).
      - name: Fetch lyrics for all artists
        working-directory: scripts
        env:
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
        run: |
          for slug in ${{ steps.slugs.outputs.list }}; do
            echo "--- Fetching $slug ---"
            python fetch_lyrics.py --slug "$slug" --incremental
          done

      # Step 4: Rebuild the inverted search index for every artist.
      - name: Rebuild search indexes
        working-directory: scripts
        run: |
          for slug in ${{ steps.slugs.outputs.list }}; do
            echo "--- Indexing $slug ---"
            python build_index.py --slug "$slug"
          done

      # Step 5: Check if any files changed (config or song data).
      - name: Check for changes
        id: diff
        run: |
          git diff --quiet -- scripts/artists-config.json public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      # Step 6: Build a markdown summary for the PR body.
      # Shows newly discovered albums and new songs per artist.
      - name: Build PR summary
        if: steps.diff.outputs.changed == 'true'
        id: summary
        run: |
          python3 << 'EOF'
          import json, subprocess, os

          with open("scripts/artists-config.json") as f:
              config = json.load(f)

          # New albums added to the config this run
          result = subprocess.run(
              ["git", "diff", "scripts/artists-config.json"],
              capture_output=True, text=True
          )
          new_album_lines = [
              l[1:].strip() for l in result.stdout.splitlines()
              if l.startswith("+") and '"genius_id"' in l and '"name"' in l
          ]

          # New songs per artist
          SLUGS = [(slug, data["name"]) for slug, data in config.items() if not slug.startswith("_")]
          rows = []
          total_new = 0

          for slug, name in SLUGS:
              path = f"public/data/{slug}/songs.json"
              result = subprocess.run(["git", "show", f"HEAD:{path}"], capture_output=True, text=True)
              old_ids = set()
              if result.returncode == 0:
                  old_ids = {str(s["id"]) for s in json.loads(result.stdout)}

              try:
                  with open(path) as f:
                      new_songs = json.load(f)
              except FileNotFoundError:
                  continue

              added_ids = {str(s["id"]) for s in new_songs} - old_ids
              if added_ids:
                  new_by_id = {str(s["id"]): s["title"] for s in new_songs}
                  titles = sorted(new_by_id[i] for i in added_ids)
                  rows.append((name, len(added_ids), titles))
                  total_new += len(added_ids)

          lines = ["## Lyrics refresh summary", ""]

          if new_album_lines:
              lines += ["### New albums discovered", ""]
              for l in new_album_lines:
                  try:
                      obj = json.loads("{" + l.rstrip(",") + "}")
                      lines.append(f"- **{obj['name']}** (genius_id: {obj['genius_id']})")
                  except Exception:
                      pass
              lines.append("")

          if rows:
              lines += ["### New songs", ""]
              lines.append("| Artist | New songs | Titles |")
              lines.append("|--------|:---------:|--------|")
              for name, count, titles in rows:
                  titles_str = ", ".join(f'"{t}"' for t in titles)
                  lines.append(f"| {name} | {count} | {titles_str} |")
              lines.append("")
              lines.append(f"**{total_new} new song{'s' if total_new != 1 else ''} total** — review the diff then merge to deploy.")
          elif not new_album_lines:
              lines.append("Metadata or index updates only — no new albums or songs.")

          body = "\n".join(lines)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("body<<GHADELIMITER\n")
              f.write(body + "\n")
              f.write("GHADELIMITER\n")
          EOF

      # Step 7: Open a PR with everything that changed.
      - name: Open PR if anything changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/lyrics-refresh
          title: 'chore: weekly lyrics refresh'
          body: ${{ steps.summary.outputs.body }}
          commit-message: 'chore: weekly lyrics refresh'
